<!DOCTYPE html>

<html>

<head>

    <title>Login Sistem</title>

    <style>

        body{

            font-family: Arial;

            background-color:#f2f2f2;

        }

        .login-box{

            width:300px;

            margin:120px auto;

            padding:20px;

            background:white;

            border-radius:8px;

            box-shadow:0 0 10px rgba(0,0,0,0.1);

        }

        input{

            width:100%;

            padding:8px;

            margin:8px 0;

        }

        button{

            width:100%;

            padding:8px;

            background:#3498db;

            color:white;

            border:none;

            cursor:pointer;

        }

        button:hover{

            background:#2980b9;

        }

    </style>

</head>



<body>



<div class="login-box">

<h2>Login</h2>



<form action="login.php" method="POST">



<label>Username</label>

<input type="text" name="username" required>



<label>Password</label>

<input type="password" name="password" required>



<button type="submit">Login</button>



</form>



</div>



</body>

</html>
